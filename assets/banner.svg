<svg width="1200" height="1000" viewBox="0 0 1200 1000" fill="none" xmlns="http://www.w3.org/2000/svg">

  <!-- Background -->
  <rect width="1200" height="1000" rx="16" fill="#1E1E1E"/>

  <!-- Top Bar -->
  <rect width="1200" height="42" rx="16" fill="#323232"/>

  <!-- Fix top radius -->
  <rect y="20" width="1200" height="22" fill="#323232"/>

  <!-- MacOS Buttons -->
  <circle cx="24" cy="21" r="6" fill="#FF5F57"/>
  <circle cx="44" cy="21" r="6" fill="#FEBC2E"/>
  <circle cx="64" cy="21" r="6" fill="#28C840"/>

  <!-- Window Title -->
  <text
    x="600"
    y="27"
    fill="#BDBDBD"
    text-anchor="middle"
    font-size="14"
    font-family="SF Mono, Menlo, Monaco, Consolas, monospace">
    moab@mac
  </text>

  <!-- whoami -->

  <text
    x="40"
    y="90"
    font-size="22"
    font-family="SF Mono, Menlo, Monaco, Consolas, monospace">
    <tspan fill="#4ADE80">moab@developer</tspan>
    <tspan fill="#60A5FA"> ~ </tspan>
    <tspan fill="#E5E5E5">% whoami</tspan>
  </text>

  <text
    x="40"
    y="125"
    fill="#E5E5E5"
    font-size="22"
    font-family="SF Mono, Menlo, Monaco, Consolas, monospace">
    Moab Alves
  </text>

  <!-- role -->

  <text
    x="40"
    y="180"
    font-size="22"
    font-family="SF Mono, Menlo, Monaco, Consolas, monospace">
    <tspan fill="#4ADE80">moab@developer</tspan>
    <tspan fill="#60A5FA"> ~ </tspan>
    <tspan fill="#E5E5E5">% cat role.txt</tspan>
  </text>

  <text
    x="40"
    y="215"
    fill="#E5E5E5"
    font-size="22"
    font-family="SF Mono, Menlo, Monaco, Consolas, monospace">
    Full Stack Developer
  </text>

  <!-- focus -->

  <text
    x="40"
    y="270"
    font-size="22"
    font-family="SF Mono, Menlo, Monaco, Consolas, monospace">
    <tspan fill="#4ADE80">moab@developer</tspan>
    <tspan fill="#60A5FA"> ~ </tspan>
    <tspan fill="#E5E5E5">% cat focus.txt</tspan>
  </text>

  <text
    x="40"
    y="305"
    fill="#E5E5E5"
    font-size="22"
    font-family="SF Mono, Menlo, Monaco, Consolas, monospace">
    Building secure, scalable and user-centered web applications.
  </text>

  <!-- about -->

  <text
    x="40"
    y="360"
    font-size="22"
    font-family="SF Mono, Menlo, Monaco, Consolas, monospace">
    <tspan fill="#4ADE80">moab@developer</tspan>
    <tspan fill="#60A5FA"> ~ </tspan>
    <tspan fill="#E5E5E5">% cat about.md</tspan>
  </text>

  <text
    x="40"
    y="395"
    fill="#E5E5E5"
    font-size="22"
    font-family="SF Mono, Menlo, Monaco, Consolas, monospace">

    <tspan x="40" dy="0">
      I'm an Information Systems undergraduate at UFPB and a Full Stack Developer Intern at PBSoft.
    </tspan>

    <tspan x="40" dy="45">
      Over the past year, I've been building web applications, implementing new features in
    </tspan>

    <tspan x="40" dy="35">
      legacy systems, maintaining production software and providing technical support.
    </tspan>

    <tspan x="40" dy="45">
      I enjoy building secure, scalable and high-performance applications by following clean
    </tspan>

    <tspan x="40" dy="35">
      architecture, clean code principles and creating intuitive user experiences.
    </tspan>

    <tspan x="40" dy="45">
      Currently expanding my knowledge across the Full Stack ecosystem and always looking
    </tspan>

    <tspan x="40" dy="35">
      for new challenges.
    </tspan>

  </text>

  <!-- Tech Stack -->

  <text
    x="40"
    y="690"
    font-size="22"
    font-family="SF Mono, Menlo, Monaco, Consolas, monospace">
    <tspan fill="#4ADE80">moab@developer</tspan>
    <tspan fill="#60A5FA"> ~ </tspan>
    <tspan fill="#E5E5E5">% ls tech-stack/</tspan>
  </text>

  <text
    x="40"
    y="725"
    fill="#E5E5E5"
    font-size="22"
    font-family="SF Mono, Menlo, Monaco, Consolas, monospace">

    <!-- Headers -->

    <tspan x="40"  dy="0" fill="#60A5FA">frontend/</tspan>
    <tspan x="290" dy="0" fill="#60A5FA">backend/</tspan>
    <tspan x="560" dy="0" fill="#60A5FA">database/</tspan>
    <tspan x="850" dy="0" fill="#60A5FA">devops/</tspan>

    <!-- Row 1 -->

    <tspan x="40"  dy="35">├── JavaScript</tspan>
    <tspan x="290" dy="0">├── Node.js</tspan>
    <tspan x="560" dy="0">├── PostgreSQL</tspan>
    <tspan x="850" dy="0">├── Git</tspan>

    <!-- Row 2 -->

    <tspan x="40"  dy="35">├── TypeScript</tspan>
    <tspan x="290" dy="0">├── PHP</tspan>
    <tspan x="560" dy="0">├── MySQL</tspan>
    <tspan x="850" dy="0">├── Docker</tspan>

    <!-- Row 3 -->

    <tspan x="40"  dy="35">├── React</tspan>
    <tspan x="290" dy="0">├── Laravel</tspan>
    <tspan x="560" dy="0">└── MongoDB</tspan>
    <tspan x="850" dy="0">└── Jenkins</tspan>

    <!-- Row 4 -->

    <tspan x="40"  dy="35">└── Next.js</tspan>
    <tspan x="290" dy="0">├── Java</tspan>

    <!-- Row 5 -->

    <tspan x="290" dy="35">└── Spring Boot</tspan>

  </text>
 
</svg>