<svg width="1200" height="340" viewBox="0 0 1200 340" fill="none" xmlns="http://www.w3.org/2000/svg">

  <!-- Background -->
  <rect width="1200" height="340" rx="16" fill="#1E1E1E"/>

  <!-- Top Bar -->
  <rect width="1200" height="42" rx="16" fill="#323232"/>

  <!-- Fix top radius -->
  <rect y="20" width="1200" height="22" fill="#323232"/>

  <!-- MacOS Buttons -->
  <circle cx="24" cy="21" r="6" fill="#FF5F57"/>
  <circle cx="44" cy="21" r="6" fill="#FEBC2E"/>
  <circle cx="64" cy="21" r="6" fill="#28C840"/>

  <!-- Window Title -->
  <text
    x="600"
    y="27"
    fill="#BDBDBD"
    text-anchor="middle"
    font-size="14"
    font-family="SF Mono, Menlo, Monaco, Consolas, monospace">
    moab@mac
  </text>

  <!-- Terminal Content -->

  <text
    x="40"
    y="90"
    fill="#E5E5E5"
    font-size="22"
    font-family="SF Mono, Menlo, Monaco, Consolas, monospace">
    moab@developer ~ % whoami
  </text>

  <text
    x="40"
    y="125"
    fill="#E5E5E5"
    font-size="22"
    font-family="SF Mono, Menlo, Monaco, Consolas, monospace">
    Moab Alves
  </text>

  <text
    x="40"
    y="180"
    fill="#E5E5E5"
    font-size="22"
    font-family="SF Mono, Menlo, Monaco, Consolas, monospace">
    moab@developer ~ % cat role.txt
  </text>

  <text
    x="40"
    y="215"
    fill="#E5E5E5"
    font-size="22"
    font-family="SF Mono, Menlo, Monaco, Consolas, monospace">
    Full Stack Developer
  </text>

  <text
    x="40"
    y="270"
    fill="#E5E5E5"
    font-size="22"
    font-family="SF Mono, Menlo, Monaco, Consolas, monospace">
    moab@developer ~ % cat focus.txt
  </text>

  <text
    x="40"
    y="305"
    fill="#E5E5E5"
    font-size="22"
    font-family="SF Mono, Menlo, Monaco, Consolas, monospace">
    Developing applications, websites and scalable web solutions
  </text>

</svg>